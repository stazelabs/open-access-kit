<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} — Open Access Kit</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #8b949e;
  --link: #58a6ff;
  --heading: #f0f6fc;
  --code-bg: #1c2128;
  --accent: #388bfd;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 0;
  line-height: 1.65;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: .75em 1.5em;
  display: flex;
  align-items: center;
  gap: 1em;
}
header a { color: var(--heading); text-decoration: none; font-weight: 600; }
header a:hover { text-decoration: none; }
main {
  max-width: 820px;
  margin: 2em auto;
  padding: 0 1.5em 4em;
}
h1, h2, h3, h4 {
  color: var(--heading);
  line-height: 1.25;
  margin-top: 1.5em;
}
a { color: var(--link); }
a:hover { text-decoration: underline; }
code {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: .15em .4em;
  font-size: .875em;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
}
pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1em 1.25em;
  overflow-x: auto;
  font-size: .875em;
}
pre code { background: none; border: none; padding: 0; }
blockquote {
  border-left: 3px solid var(--border);
  margin: 1em 0;
  padding: .5em 1em;
  color: var(--muted);
}
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid var(--border); padding: .5em .75em; text-align: left; }
th { background: var(--surface); color: var(--heading); }
hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
footer {
  text-align: center;
  font-size: .8em;
  color: var(--muted);
  padding: 2em 1em;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<header>
  <a href="{{if .BaseURL}}{{.BaseURL}}/{{else}}index.html{{end}}">&#127795; Open Access Kit</a>
</header>
<main>
{{.Body}}
</main>
<footer>
  Open Access Kit &mdash;
  Code: <a href="https://www.gnu.org/licenses/gpl-3.0.html">GPL v3</a>
  &nbsp;&middot;&nbsp;
  Content: <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>
  &nbsp;&middot;&nbsp;
  <a href="{{if .BaseURL}}{{.BaseURL}}/license.html{{else}}license.html{{end}}">License</a>
</footer>
</body>
</html>
