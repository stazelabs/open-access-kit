release: Q126
download_root: https://oak-releases.stazelabs.org

paths:
  mirror: ./mirror
  image: ./image
  output: ./dist

tiers:
  S:
    label: "S"
    budget_gb: 4
    sources:
      - tor-browser
      - torproject-manual
      - siabguide
      - dfak
      - privacy-guides
      - educational-content
      - media-content
      - keys
      - orbot
  M:
    label: "M"
    budget_gb: 14
    sources:
      - tor-browser
      - torproject-manual
      - siabguide
      - dfak
      - privacy-guides
      - saferjourno
      - educational-content
      - media-content
      - keys
      - tails
      - tails-doc
      - onionshare
      - orbot
      - kiwix-tools
      - kiwix-desktop
      - zim-p0
      - zim-p1
      - zim-p1-wikipedia
  L:
    label: "L"
    budget_gb: 29
    sources:
      - tor-browser
      - torproject-manual
      - siabguide
      - dfak
      - privacy-guides
      - saferjourno
      - educational-content
      - media-content
      - keys
      - tails
      - tails-doc
      - onionshare
      - orbot
      - kiwix-tools
      - kiwix-desktop
      - zim-p0
      - zim-p1
      - zim-p2

sources:
  tor-browser:
    type: rsync
    description: "Tor Browser (latest stable, all platforms)"
    version_detect:
      method: http-scrape
      url: "https://www.torproject.org/dist/torbrowser/"
      pattern: '>([0-9]+\.[0-9]+(\.[0-9]+)?)/<'
      select: highest-semver
    rsync_base: "rsync://rsync.torproject.org/dist-mirror/torbrowser/{version}/"
    files:
      - "tor-browser-windows-x86_64-portable-{version}.exe"
      - "tor-browser-windows-x86_64-portable-{version}.exe.asc"
      - "tor-browser-macos-{version}.dmg"
      - "tor-browser-macos-{version}.dmg.asc"
      - "tor-browser-linux-x86_64-{version}.tar.xz"
      - "tor-browser-linux-x86_64-{version}.tar.xz.asc"
      - "tor-browser-android-aarch64-{version}.apk"
      - "tor-browser-android-aarch64-{version}.apk.asc"
    verify:
      method: gpg
      keyring: keys/torproject-signing.gpg
    stage_path: "software/tor-browser/"

  torproject-manual:
    type: git
    description: "Tor Browser Manual (built HTML, CC-BY-4.0)"
    git_url: "https://github.com/torproject/manual.git"
    git_branch: "gh-pages"
    shallow: true
    stage_path: "guides/resources/torproject-manual/"

  siabguide:
    type: git
    description: "Security in a Box — digital security guides for human rights defenders (CC-BY-SA-3.0)"
    git_url: "https://github.com/securityinabox/siabguide.git"
    shallow: true
    render_markdown: true
    stage_path: "guides/resources/siabguide/"

  dfak:
    type: git
    description: "Digital First Aid Kit — self-diagnosis tools for people facing digital threats (CC-BY-4.0)"
    git_url: "https://gitlab.com/rarenet/dfak_2020.git"
    shallow: true
    render_markdown: true
    stage_path: "guides/resources/dfak/"

  privacy-guides:
    type: git
    description: "Privacy Guides — community-maintained privacy tool recommendations (CC-BY-SA-4.0)"
    git_url: "https://github.com/privacyguides/privacyguides.org.git"
    shallow: true
    render_markdown: true
    exclude_dirs: [".cache"]
    stage_path: "guides/resources/privacy-guides/"

  saferjourno:
    type: git
    description: "SaferJourno — digital security guide for journalists (CC-BY-SA-4.0)"
    git_url: "https://github.com/OpenInternet/saferjourno.git"
    shallow: true
    render_markdown: true
    stage_path: "guides/resources/saferjourno/"

  tails-doc:
    type: site-mirror
    description: "Tails OS documentation (CC-BY-SA-4.0)"
    mirror_url: "https://tails.net/doc/"
    stage_path: "guides/resources/tails-doc/"

  tails:
    type: rsync
    description: "Tails OS (latest stable)"
    version_detect:
      method: rsync-list
      url: "rsync://rsync.tails.net/amnesia-archive/tails/stable/"
      pattern: 'tails-amd64-([0-9]+\.[0-9]+(?:\.[0-9]+)?)'
      select: highest-semver
    rsync_base: "rsync://rsync.tails.net/amnesia-archive/tails/stable/tails-amd64-{version}/"
    files:
      - "tails-amd64-{version}.img"
      - "tails-amd64-{version}.img.sig"
      - "tails-amd64-{version}.iso"
      - "tails-amd64-{version}.iso.sig"
    verify:
      method: gpg
      keyring: keys/tails-signing.gpg
    stage_path: "software/tails/"

  onionshare:
    type: http
    description: "OnionShare - Secure anonymous file sharing over Tor"
    version_detect:
      method: http-scrape
      url: "https://onionshare.org/dist/"
      pattern: 'href="([0-9]+\.[0-9]+(?:\.[0-9]+)?)/"'
      select: highest-semver
    rsync_base: "https://onionshare.org/dist/{version}/"
    files:
      - "OnionShare-win64-{version}.msi"
      - "OnionShare-win64-{version}.msi.asc"
      - "OnionShare-{version}.dmg"
      - "OnionShare-{version}.dmg.asc"
      - "OnionShare-{version}.flatpak"
      - "OnionShare-{version}.flatpak.asc"
    verify:
      method: gpg
      keyring: keys/onionshare-signing.gpg
    stage_path: "software/onionshare/"

  orbot:
    type: github-release
    description: "Orbot - Tor proxy for Android (all apps)"
    github_repo: "guardianproject/orbot-android"
    asset_patterns:
      - 'fullperm-arm64-v8a-release\.apk$'
      - 'fullperm-arm64-v8a-release\.apk\.asc$'
      - 'fullperm-armeabi-v7a-release\.apk$'
      - 'fullperm-armeabi-v7a-release\.apk\.asc$'
    verify:
      method: gpg
      keyring: keys/orbot-signing.gpg
    stage_path: "software/orbot/"

  kiwix-tools:
    type: http
    description: "Kiwix-serve — offline ZIM content server (Linux, macOS)"
    version_detect:
      method: http-scrape
      url: "https://download.kiwix.org/release/kiwix-tools/"
      pattern: 'kiwix-tools_linux-x86_64-([0-9]+\.[0-9]+\.[0-9]+)\.tar\.gz'
      select: highest-semver
    rsync_base: "https://download.kiwix.org/release/kiwix-tools/"
    files:
      - "kiwix-tools_linux-x86_64-{version}.tar.gz"
      - "kiwix-tools_macos-arm64-{version}.tar.gz"
      - "kiwix-tools_macos-x86_64-{version}.tar.gz"
    stage_path: "software/kiwix/"

  kiwix-desktop:
    type: http
    description: "Kiwix Desktop — offline ZIM reader GUI (Windows, Linux)"
    version_detect:
      method: http-scrape
      url: "https://download.kiwix.org/release/kiwix-desktop/"
      pattern: 'kiwix-desktop_windows_x64_([0-9]+\.[0-9]+\.[0-9]+)\.zip'
      select: highest-semver
    rsync_base: "https://download.kiwix.org/release/kiwix-desktop/"
    files:
      - "kiwix-desktop_windows_x64_{version}.zip"
      - "kiwix-desktop_x86_64_{version}.appimage"
    stage_path: "software/kiwix-desktop/"

  keys:
    type: local
    description: "GPG signing keys for software verification"
    local_path: "./keys/"
    stage_path: "keys/"

  educational-content:
    type: local
    description: "Bundled guides and documentation"
    local_path: "./content/guides/"
    stage_path: "guides/"

  media-content:
    type: local
    description: "Image-only bundled content (not published to website)"
    local_path: "./content/media/"
    stage_path: "guides/resources/"

  zim-p0:
    type: kiwix-zim
    description: "ZIM P0 — critical survival and medical content (~1 GB)"
    stage_path: "zim/"
    zim_files:
      - name: zimgit-medicine_en
        category: zimgit
        stage_subdir: medical
      - name: zimgit-water_en
        category: zimgit
        stage_subdir: survival
      - name: zimgit-knots_en
        category: zimgit
        stage_subdir: survival
      - name: zimgit-food-preparation_en
        category: zimgit
        stage_subdir: survival
      - name: librepathology_en_all_maxi
        category: librepathology
        stage_subdir: medical
      - name: freecodecamp_en_all
        category: freecodecamp
        stage_subdir: education
      - name: vikidia_en_all_maxi
        category: vikidia
        stage_subdir: education
      - name: wiktionary_en_simple_all_nopic
        category: wiktionary
        stage_subdir: reference
      - name: zimgit-post-disaster_en
        category: zimgit
        stage_subdir: survival

  zim-p1-wikipedia:
    type: kiwix-zim
    description: "ZIM P1 Wikipedia — Simple English Wikipedia for M tier (~3.1 GB)"
    stage_path: "zim/"
    zim_files:
      - name: wikipedia_en_simple_all_maxi
        category: wikipedia
        stage_subdir: reference

  zim-p1:
    type: kiwix-zim
    description: "ZIM P1 — core reference and education content for M and L tiers (~8 GB)"
    stage_path: "zim/"
    zim_files:
      - name: phet_en_all
        category: phet
        stage_subdir: education
      - name: appropedia_en_all_maxi
        category: other
        stage_subdir: sustainability
      - name: energypedia_en_all_nopic
        category: other
        stage_subdir: sustainability
      - name: wikivoyage_en_all_maxi
        category: wikivoyage
        stage_subdir: reference
      - name: ted_mul_ted-ed
        category: ted
        stage_subdir: education
      - name: gutenberg_en_lcc-s
        category: gutenberg
        stage_subdir: literature

  zim-p2:
    type: kiwix-zim
    description: "ZIM P2 — broader reference for L tier, includes Wikipedia mini (~26 GB)"
    stage_path: "zim/"
    zim_files:
      - name: wikipedia_en_all_mini
        category: wikipedia
        stage_subdir: reference
      - name: wikibooks_en_all_nopic
        category: wikibooks
        stage_subdir: education
      - name: mdwiki_en_all_maxi
        category: mdwiki
        stage_subdir: medical
      - name: wikiversity_en_all_maxi
        category: wikiversity
        stage_subdir: education
      - name: superuser.com_en_all
        category: stack_exchange
        stage_subdir: tech
      - name: gutenberg_en_lcc-h
        category: gutenberg
        stage_subdir: literature

signing:
  enabled: true
  key_id: ""
  public_key: keys/oak-signing.pub
