release: Q126

paths:
  mirror: ./mirror
  image: ./image
  output: ./dist

tiers:
  "16":
    label: "16GB"
    budget_gb: 14
    sources:
      - tor-browser
      - onion-sites
      - educational-content
  "32":
    label: "32GB"
    budget_gb: 29
    sources:
      - tor-browser
      - onion-sites
      - educational-content
      - tails
  "64":
    label: "64GB"
    budget_gb: 58
    sources:
      - tor-browser
      - onion-sites
      - educational-content
      - tails
  max:
    label: "Max"
    budget_gb: 0
    sources:
      - tor-browser
      - onion-sites
      - educational-content
      - tails

sources:
  tor-browser:
    type: rsync
    description: "Tor Browser (latest stable, all platforms)"
    version_detect:
      method: http-scrape
      url: "https://www.torproject.org/dist/torbrowser/"
      pattern: '>([0-9]+\.[0-9]+(\.[0-9]+)?)/<'
      select: highest-semver
    rsync_base: "rsync://rsync.torproject.org/dist-mirror/torbrowser/{version}/"
    files:
      - "tor-browser-windows-x86_64-portable-{version}.exe"
      - "tor-browser-windows-x86_64-portable-{version}.exe.asc"
      - "tor-browser-macos-{version}.dmg"
      - "tor-browser-macos-{version}.dmg.asc"
      - "tor-browser-linux-x86_64-{version}.tar.xz"
      - "tor-browser-linux-x86_64-{version}.tar.xz.asc"
      - "tor-browser-android-aarch64-{version}.apk"
      - "tor-browser-android-aarch64-{version}.apk.asc"
    verify:
      method: gpg
      keyring: keys/torproject-signing.gpg
    stage_path: "software/tor-browser/"

  onion-sites:
    type: git
    description: "Real-world onion sites directory"
    git_url: "https://github.com/alecmuffett/real-world-onion-sites.git"
    shallow: true
    stage_path: "resources/onion-sites/"

  tails:
    type: rsync
    description: "Tails OS (latest stable)"
    version_detect:
      method: rsync-list
      url: "rsync://rsync.tails.net/amnesia-archive/tails/stable/"
      pattern: 'tails-amd64-([0-9]+\.[0-9]+(?:\.[0-9]+)?)'
      select: highest-semver
    rsync_base: "rsync://rsync.tails.net/amnesia-archive/tails/stable/tails-amd64-{version}/"
    files:
      - "tails-amd64-{version}.img"
      - "tails-amd64-{version}.img.sig"
      - "tails-amd64-{version}.iso"
      - "tails-amd64-{version}.iso.sig"
    verify:
      method: gpg
      keyring: keys/tails-signing.gpg
    stage_path: "software/tails/"

  educational-content:
    type: local
    description: "Bundled guides and documentation"
    local_path: "./content/guides/"
    stage_path: "guides/"

signing:
  enabled: true
  key_id: ""
  public_key: keys/oak-signing.pub
